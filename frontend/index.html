<!doctype html>
<html lang="en" data-theme="vector-green">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CME.exe — AI × Design Lab</title>
    <meta
      name="description"
      content="CME.exe — A Medvesek Experiment in AI × Design. The Machine as Co-Author."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Mono:wght@400;500;700&family=Fira+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply persisted theme before paint to avoid flash of default theme.
      (function () {
        try {
          var t = localStorage.getItem("cme_exe_theme");
          if (t) document.documentElement.setAttribute("data-theme", t);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
